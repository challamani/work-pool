server:
  port: 8084

spring:
  application:
    name: payment-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/workpool_payments}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.workpool.*"

jwt:
  secret: ${JWT_SECRET:changeme_in_production_at_least_32_chars_long}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:webhook_secret}

platform:
  commission-rate: 0.01

springdoc:
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.workpool: DEBUG
