# ─── HTTPS / TLS profile for the API Gateway ─────────────────────────────────
# Activate with: --spring.profiles.active=ssl
# Or via environment variable: SPRING_PROFILES_ACTIVE=ssl
#
# Requires a PKCS12 keystore at the path referenced below.
# See work-pool-backend/work-pool-api-gateway/README.md for generation instructions.
server:
  port: 8443
  ssl:
    enabled: true
    # Path to keystore; override at runtime with SERVER_SSL_KEY_STORE env var
    key-store: ${SERVER_SSL_KEY_STORE:classpath:ssl/gateway-keystore.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: ${SERVER_SSL_KEY_ALIAS:gateway}
    # Enforce TLS 1.2+ only; disable weak protocols
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3
