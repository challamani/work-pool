apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: work-pool
type: Opaque
stringData:
  SPRING_DATA_MONGODB_URI: "mongodb://workpool:workpool_secret@mongodb:27017/workpool_users?authSource=admin"
  GOOGLE_CLIENT_ID: "replace-google-client-id"
  GOOGLE_CLIENT_SECRET: "replace-google-client-secret"
  FACEBOOK_CLIENT_ID: "replace-facebook-client-id"
  FACEBOOK_CLIENT_SECRET: "replace-facebook-client-secret"

