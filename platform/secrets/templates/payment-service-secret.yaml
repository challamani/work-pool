apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secret
  namespace: work-pool
type: Opaque
stringData:
  SPRING_DATA_MONGODB_URI: "mongodb://workpool:workpool_secret@mongodb:27017/workpool_payments?authSource=admin"
  RAZORPAY_KEY_ID: "replace-razorpay-key-id"
  RAZORPAY_KEY_SECRET: "replace-razorpay-key-secret"
  RAZORPAY_WEBHOOK_SECRET: "replace-razorpay-webhook-secret"

