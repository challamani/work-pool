apiVersion: apps/v1
kind: Deployment
metadata:
  name: hazelcast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hazelcast
  template:
    metadata:
      labels:
        app: hazelcast
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: hazelcast
          image: hazelcast/hazelcast:5.3
          ports:
            - containerPort: 5701
          env:
            - name: HZ_CLUSTERNAME
              value: work-pool-cluster
---
apiVersion: v1
kind: Service
metadata:
  name: hazelcast
spec:
  selector:
    app: hazelcast
  ports:
    - name: hazelcast
      port: 5701
      targetPort: 5701
