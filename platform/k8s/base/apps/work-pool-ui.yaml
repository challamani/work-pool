apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-pool-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: work-pool-ui
  template:
    metadata:
      labels:
        app: work-pool-ui
    spec:
      containers:
        - name: work-pool-ui
          image: work-pool-ui:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: work-pool-ui
spec:
  selector:
    app: work-pool-ui
  ports:
    - name: http
      port: 80
      targetPort: 80

