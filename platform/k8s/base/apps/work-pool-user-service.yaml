apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-pool-user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: work-pool-user-service
  template:
    metadata:
      labels:
        app: work-pool-user-service
    spec:
      containers:
        - name: work-pool-user-service
          image: work-pool-user-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: work-pool-shared-config
            - secretRef:
                name: work-pool-shared-secret
            - secretRef:
                name: work-pool-user-service-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: work-pool-user-service
spec:
  selector:
    app: work-pool-user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081

