apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-pool-user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: work-pool-user-service
  template:
    metadata:
      labels:
        app: work-pool-user-service
    spec:
      containers:
        - name: work-pool-user-service
          image: work-pool-user-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: JAVA_OPTS
              value: "-Xmx384m -Xms256m -XX:+UseG1GC"
          envFrom:
            - configMapRef:
                name: work-pool-shared-config
            - secretRef:
                name: work-pool-shared-secret
            - secretRef:
                name: work-pool-user-service-secret
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 640Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: work-pool-user-service
spec:
  selector:
    app: work-pool-user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
