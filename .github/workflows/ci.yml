name: CI

on:
  push:
    branches: [main, master, develop, "copilot/**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend - build/test/quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: work-pool-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven verify (tests + checkstyle + spotbugs + jacoco)
        run: mvn --batch-mode --no-transfer-progress clean verify

  frontend-quality:
    name: Frontend - lint/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: work-pool-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: work-pool-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config -q

      - name: Build local images
        run: docker compose build

      - name: Boot core infra
        run: docker compose up -d mongodb zookeeper kafka hazelcast mailhog

      - name: Show running containers
        run: docker compose ps

      - name: Stop compose stack
        if: always()
        run: docker compose down -v
